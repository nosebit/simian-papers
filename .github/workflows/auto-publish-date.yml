name: Auto Publish Date

on:
  pull_request:
    types:
      - closed

jobs:
  auto_publish:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_RELEASE_PLZ_TOKEN }}
          fetch-depth: 2

      - name: Set publishedAt date
        id: set-date
        run: |
          UPDATED=false
          # Find metadata.json files that were modified in the merged PR
          for file in $(git diff --name-only HEAD^1 HEAD | grep 'metadata.json$' || true); do
            # Check if publishedAt is null or missing
            if ! jq -e '.publishedAt and .publishedAt != null' "$file" > /dev/null; then
              echo "Adding publishedAt and approvers to $file"
              DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
              
              # Fetch approvers from PR reviews
              APPROVERS=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews" \
                | jq -r '.[] | select(.state == "APPROVED") | .user.id' | sort -u | jq -R . | jq -s 'map(tonumber)')
              
              # Ensure APPROVERS is a valid array, default to empty array
              if [ -z "$APPROVERS" ] || [ "$APPROVERS" == "null" ]; then
                APPROVERS="[]"
              fi

              jq ".publishedAt = \"$DATE\" | .approvers = $APPROVERS" "$file" > tmp.json && mv tmp.json "$file"
              UPDATED=true
            fi
          done
          echo "updated=$UPDATED" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.set-date.outputs.updated == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: auto-add publishedAt to metadata.json"
          git push
