name: "Auto-Assign Reviewer"
on:
  pull_request_target:
    types: [opened, ready_for_review]

permissions:
  pull-requests: write
  contents: read

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - name: Pick random collaborator and assign
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login;
            
            // Get all direct collaborators
            const collaborators = await github.rest.repos.listCollaborators({
              owner: context.repo.owner,
              repo: context.repo.repo,
              affiliation: 'direct'
            });
            
            // Filter out the PR author
            const validApprovers = collaborators.data
              .map(user => user.login)
              .filter(login => login !== author);
              
            if (validApprovers.length === 0) return;
            
            // Pick a random approver
            const randomApprover = validApprovers[Math.floor(Math.random() * validApprovers.length)];
            
            // Formally request their review!
            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              reviewers: [randomApprover]
            });
